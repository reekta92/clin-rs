name: Update README Version

on:
  release:
    types: [published, edited]

jobs:
  update-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Update version strings
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG_NAME="${{ github.event.release.tag_name }}"
          DEB_FILE=$(gh release view "$TAG_NAME" --json assets --jq '.assets[].name | select(endswith(".deb"))')
          RPM_FILE=$(gh release view "$TAG_NAME" --json assets --jq '.assets[].name | select(endswith(".rpm"))')
          TAR_FILE=$(gh release view "$TAG_NAME" --json assets --jq '.assets[].name | select(startswith("clin-rs") and endswith(".tar.gz"))')
          sed -i -E "s/clin-rs_[0-9a-zA-Z.-]+_amd64\.deb/$DEB_FILE/g" README.md
          sed -i -E "s/clin-rs-[0-9a-zA-Z.-]+\.x86_64\.rpm/$RPM_FILE/g" README.md
          sed -i -E "s/clin-rs-[0-9a-zA-Z.-]+-x86_64\.tar\.gz/$TAR_FILE/g" README.md

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          if ! git diff --staged --quiet; then
            git commit -m "docs: update installation versions to ${{ github.event.release.tag_name }}"
            git push origin HEAD:main
          fi

name: Update README Version

on:
  release:
    types: [published, edited]

jobs:
  update-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # This forces it to checkout your main branch instead of the detached tag
          ref: ${{ github.event.repository.default_branch }}

      - name: Update version strings
        run: |
          TAG_NAME="${{ github.event.release.tag_name }}"
          CLEAN_VERSION="${TAG_NAME#v}"
          
          # Replace the versions in the README
          sed -i -E "s/clin-rs_[0-9a-zA-Z.-]+_amd64\.deb/clin-rs_${CLEAN_VERSION}_amd64.deb/g" README.md
          sed -i -E "s/clin-rs-[0-9a-zA-Z.-]+\.x86_64\.rpm/clin-rs-${CLEAN_VERSION}.x86_64.rpm/g" README.md
          sed -i -E "s/clin-rs-[0-9a-zA-Z.-]+-x86_64\.tar\.gz/clin-rs-${CLEAN_VERSION}-x86_64.tar.gz/g" README.md
          
          # Setup git bot
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          
          # Check if there are actually changes to commit
          if ! git diff-index --quiet HEAD; then
            git commit -m "docs: update installation versions to $TAG_NAME"
            git push
          else
            echo "No changes found in README.md. Skipping commit."
          fi
